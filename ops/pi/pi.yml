---
- name: Configure Alpine Pi
  hosts: pi
  gather_facts: false

  handlers:
    - name: activate awall
      # Nutze async, damit Ansible nicht hängen bleibt, falls die SSH-Verbindung kurz zuckt
      ansible.builtin.shell: awall activate -f
      async: 10
      poll: 0

    - name: save alpine state
      ansible.builtin.command: lbu commit -d
      listen: "lbu commit"

    - name: restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted

  pre_tasks:
    - name: Bootstrap Python for Ansible
      ansible.builtin.raw: apk add --no-cache python3
      changed_when: false
      
    - name: Gather facts explicitly
      ansible.builtin.setup:

  tasks:
    - name: Update apk cache and install basic tools
      community.general.apk:
        name:
          - nano
          - htop
          - curl
          - e2fsprogs # NEU: Für das ext4 Dateisystem
        state: present
        update_cache: yes
      notify: "lbu commit"

    - name: Enforce strictly allowed SSH keys for root
      ansible.posix.authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', 'authorized_keys') }}"
        exclusive: yes
      notify: "lbu commit"

    # --- SSH Härten ---
    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: 
        - restart sshd
        - lbu commit

    - name: Disable root password login (allow keys only)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
      notify: 
        - restart sshd
        - lbu commit

    # --- Daten-Partition mounten ---
    - name: Mount data partition and add to fstab
      ansible.posix.mount:
        path: /mnt/data
        src: /dev/mmcblk0p2
        fstype: ext4
        state: mounted
      notify: "lbu commit"

    # --- NEU: awall Firewall ---
    - name: Install awall and iptables
      community.general.apk:
        name:
          - awall
          - iptables
          - ip6tables
        state: present
      notify: "lbu commit"

    - name: Enable iptables service on boot
      ansible.builtin.service:
        name: iptables
        enabled: yes
      notify: "lbu commit"

    - name: Configure awall base policy
      ansible.builtin.copy:
        dest: /etc/awall/private/server.json
        content: |
          {
            "description": "Single Node Server Firewall",
            "zone": {
              "ext": { "iface": "eth0" }
            },
            "policy": [
              { "in": "ext", "action": "drop" },
              { "action": "accept" }
            ],
            "filter": [
              { "in": "ext", "service": ["ssh", "ping"], "action": "accept" }
            ]
          }
        mode: '0644'
      notify: 
        - activate awall
        - lbu commit
