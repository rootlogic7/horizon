---
- name: Configure Alpine Pi
  hosts: pi
  gather_facts: false

  handlers:
    - name: activate awall
      ansible.builtin.command: awall activate -f
      notify: restart fail2ban

    - name: save alpine state
      ansible.builtin.command: lbu commit -d
      listen: "lbu commit"

    - name: restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

    - name: reload sysctl
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-rootless.conf

  pre_tasks:
    - name: Bootstrap Python for Ansible
      ansible.builtin.raw: apk add --no-cache python3
      changed_when: false
      
    - name: Gather facts explicitly
      ansible.builtin.setup:

  tasks:
    - name: Update apk cache and install basic tools
      community.general.apk:
        name:
          - nano
          - htop
          - curl
          - e2fsprogs
          - ncurses-terminfo
        state: present
        update_cache: yes
      notify: "lbu commit"

    - name: Install chrony for time synchronization
      community.general.apk:
        name: chrony
        state: present
      notify: "lbu commit"

    - name: Enable and start chronyd service
      ansible.builtin.service:
        name: chronyd
        enabled: yes
        state: started

    - name: Enforce strictly allowed SSH keys for root
      ansible.posix.authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', 'authorized_keys') }}"
        exclusive: yes
      notify: "lbu commit"

    # --- SSH Härten ---
    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: 
        - restart sshd
        - lbu commit

    - name: Disable root password login (allow keys only)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
      notify: 
        - restart sshd
        - lbu commit

    # --- Daten-Partition mounten ---
    - name: Mount data partition and add to fstab
      ansible.posix.mount:
        path: /mnt/data
        src: /dev/mmcblk0p2
        fstype: ext4
        opts: defaults,noatime
        state: mounted
      notify: "lbu commit"

    # --- NEU: awall Firewall ---
    - name: Install awall and iptables
      community.general.apk:
        name:
          - awall
          - iptables
          - ip6tables
        state: present
      notify: "lbu commit"

    - name: Enable iptables service on boot
      ansible.builtin.service:
        name: iptables
        enabled: yes
      notify: "lbu commit"

    # --- awall Firewall (Erweitert für Syncthing & Gitea) ---
    - name: Configure awall base policy with container ports
      ansible.builtin.copy:
        dest: /etc/awall/optional/server.json
        content: |
          {
            "description": "Single Node Server Firewall",
            "zone": {
              "ext": { "iface": "eth0" }
            },
            "policy": [
              { "in": "ext", "action": "drop" },
              { "action": "accept" }
            ],
            "filter": [
              { "in": "ext", "service": ["ssh", "ping"], "action": "accept" },
              { "in": "ext", "port": [22000, 8384], "protocol": "tcp", "action": "accept" },
              { "in": "ext", "port": [22000, 21027], "protocol": "udp", "action": "accept" },
              { "in": "ext", "port": [3000, 2222], "protocol": "tcp", "action": "accept" },
              { "in": "ext", "port": [53, 3001, 8080], "protocol": "tcp", "action": "accept" },
              { "in": "ext", "port": 53, "protocol": "udp", "action": "accept" }
            ]
          }
        mode: '0644'
      notify: 
        - activate awall
        - lbu commit

    - name: Enable awall server policies
      ansible.builtin.command: awall enable server
      args:
        creates: /etc/awall/server.json
      notify: 
        - activate awall
        - lbu commit

    # --- Sicherheit: Fail2ban ---
    - name: Install fail2ban
      community.general.apk:
        name: fail2ban
        state: present
      notify: "lbu commit"

    - name: Configure fail2ban for SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          ignoreip = 127.0.0.1/8 192.168.178.0/24
          banaction = iptables-multiport

          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/messages
          maxretry = 3
          bantime = 3600
          findtime = 600
        mode: '0644'
      notify: 
        - restart fail2ban
        - lbu commit

    - name: Enable and start fail2ban service
      ansible.builtin.service:
        name: fail2ban
        enabled: yes
        state: started

    # --- Repositories anpassen ---
    - name: Enable Alpine community repository
      ansible.builtin.replace:
        path: /etc/apk/repositories
        # Sucht nach der auskommentierten Community-Zeile und entfernt die Raute (#)
        regexp: '^#\s*(http.*/community)$'
        replace: '\1'
      notify: "lbu commit"

    # --- Rootless Podman: Basis-Pakete & Cgroups ---
    - name: Install Podman, Compose and rootless dependencies
      community.general.apk:
        name:
          - podman
          - podman-compose   # <-- NEU hinzugefügt
          - shadow           
          - fuse-overlayfs   
          - slirp4netns      
          - iptables
        state: present
        update_cache: yes
      notify: "lbu commit"

    - name: Ensure cgroups service is enabled and started
      ansible.builtin.service:
        name: cgroups
        enabled: yes
        state: started
      notify: "lbu commit"

    # --- Rootless Podman: User & Mapping ---
    - name: Create podman group
      ansible.builtin.group:
        name: podman
        state: present
      notify: "lbu commit"

    - name: Create dedicated podman user
      ansible.builtin.user:
        name: podman_user
        group: podman
        shell: /bin/ash
        create_home: yes
        home: /home/podman_user
      notify: "lbu commit"

    - name: Define subuid for podman_user
      ansible.builtin.lineinfile:
        path: /etc/subuid
        regexp: '^podman_user:'
        line: 'podman_user:100000:65536'
        create: yes
      notify: "lbu commit"

    - name: Define subgid for podman_user
      ansible.builtin.lineinfile:
        path: /etc/subgid
        regexp: '^podman_user:'
        line: 'podman_user:100000:65536'
        create: yes
      notify: "lbu commit"

    - name: Exclude Podman storage from lbu backups
      ansible.builtin.command: lbu exclude /home/podman_user/.local/share/containers
      changed_when: false
      notify: "lbu commit"

    # --- Persistenz & Rechte ---
    - name: Create persistent data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: podman_user
        group: podman
        mode: '0755'
      loop:
        - /mnt/data/syncthing
        - /mnt/data/gitea
        - /mnt/data/adguard/work
        - /mnt/data/adguard/conf
      notify: "lbu commit"

    - name: Create local run directory for podman_user
      ansible.builtin.file:
        path: /home/podman_user/.run
        state: directory
        owner: podman_user
        group: podman
        mode: '0700'
      notify: "lbu commit"

    - name: Allow unprivileged users to bind to port 53 (DNS)
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-rootless.conf
        content: |
          net.ipv4.ip_unprivileged_port_start=53
        mode: '0644'
      notify: 
        - reload sysctl
        - lbu commit

    - name: Apply sysctl settings immediately
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-rootless.conf
      changed_when: false

    # --- NEU: Podman Compose Setup ---
    - name: Deploy docker-compose.yml
      ansible.builtin.copy:
        dest: /mnt/data/docker-compose.yml
        owner: podman_user
        group: podman
        mode: '0644'
        content: |
          version: '3'
          services:
            syncthing:
              image: docker.io/syncthing/syncthing:latest
              container_name: syncthing
              restart: unless-stopped
              ports:
                - "8384:8384"
                - "22000:22000/tcp"
                - "22000:22000/udp"
                - "21027:21027/udp"
              volumes:
                - /mnt/data/syncthing:/var/syncthing

            gitea:
              image: docker.io/gitea/gitea:latest
              container_name: gitea
              restart: unless-stopped
              ports:
                - "3000:3000"
                - "2222:22"
              volumes:
                - /mnt/data/gitea:/data

            adguard:
              image: docker.io/adguard/adguardhome:latest
              container_name: adguard
              restart: unless-stopped
              ports:
                - "53:53/tcp"
                - "53:53/udp"
                - "3001:3000/tcp"
                - "8080:80/tcp"
              volumes:
                - /mnt/data/adguard/work:/opt/adguardhome/work
                - /mnt/data/adguard/conf:/opt/adguardhome/conf
      notify: "lbu commit"

    - name: Create OpenRC init script for podman-compose
      ansible.builtin.copy:
        dest: /etc/init.d/containers
        mode: '0755'
        content: |
          #!/sbin/openrc-run
          
          name="Podman Compose Containers"
          description="Runs rootless containers via podman-compose"
          
          depend() {
              need net localmount
              after firewall
          }
          
          start() {
              ebegin "Starting containers via podman-compose"
              su -l podman_user -c "export XDG_RUNTIME_DIR=/home/podman_user/.run; podman-compose -f /mnt/data/docker-compose.yml up -d"
              eend $?
          }
          
          stop() {
              ebegin "Stopping containers via podman-compose"
              su -l podman_user -c "export XDG_RUNTIME_DIR=/home/podman_user/.run; podman-compose -f /mnt/data/docker-compose.yml down"
              eend $?
          }
      notify: "lbu commit"

    - name: Enable and start containers OpenRC service
      ansible.builtin.service:
        name: containers
        enabled: yes
        state: started
