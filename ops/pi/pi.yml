---
- name: Configure Alpine Pi
  hosts: pi
  gather_facts: false
  force_handlers: true

  handlers:
    - name: activate awall
      ansible.builtin.command: awall activate -f
      notify: restart fail2ban

    - name: save alpine state
      ansible.builtin.command: lbu commit -d
      listen: "lbu commit"

    - name: restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

    - name: reload sysctl
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-rootless.conf

    - name: restart chronyd
      ansible.builtin.service:
        name: chronyd
        state: restarted

    - name: restart containers
      ansible.builtin.service:
        name: containers
        state: restarted

  pre_tasks:
    - name: Set system hostname permanently to 'pi'
      ansible.builtin.hostname:
        name: pi
      notify: "lbu commit"

    - name: Bootstrap Python for Ansible
      ansible.builtin.raw: apk add --no-cache python3 || true
      changed_when: false

    - name: Gather facts explicitly
      ansible.builtin.setup:

  tasks:
    # --- 1. SYSTEM GRUNDLAGEN ---
    - name: Update apk cache and install basic tools
      community.general.apk:
        name: [nano, htop, curl, e2fsprogs, ncurses-terminfo]
        state: present
        update_cache: yes
      notify: "lbu commit"

    - name: Enable Alpine community repository
      ansible.builtin.replace:
        path: /etc/apk/repositories
        regexp: '^#\s*(http.*/community)$'
        replace: '\1'
      notify: "lbu commit"

    # --- 2. MOUNT & FIREWALL (AWALL) ---
    - name: Mount data partition
      ansible.posix.mount:
        path: /mnt/data
        src: /dev/mmcblk0p2
        fstype: ext4
        opts: defaults,noatime
        state: mounted
      notify: "lbu commit"

    - name: Install awall, iptables and fail2ban
      community.general.apk:
        name: [awall, iptables, ip6tables, fail2ban]
        state: present
      notify: "lbu commit"

    - name: Configure awall base policy with container ports
      ansible.builtin.copy:
        dest: /etc/awall/optional/server.json
        content: |
          {
            "description": "Single Node Server Firewall",
            "zone": { "ext": { "iface": "eth0" } },
            "policy": [ { "in": "ext", "action": "drop" }, { "action": "accept" } ],
            "filter": [
              { 
                "in": "ext", 
                "src": ["192.168.178.11", "192.168.178.12"], 
                "service": ["ssh", "ping"], 
                "action": "accept" 
              },
              { 
                "in": "ext", 
                "src": ["192.168.178.11", "192.168.178.12"], 
                "port": [3000, 2222, 53, 3001, 3002, 5001, 8080], 
                "protocol": "tcp", 
                "action": "accept" 
              },
              { 
                "in": "ext", 
                "src": ["192.168.178.11", "192.168.178.12"], 
                "port": 53, 
                "protocol": "udp", 
                "action": "accept" 
              }
            ]
          }
        mode: '0644'
      notify: 
        - activate awall
        - lbu commit

    - name: Enable awall server policies
      ansible.builtin.command: awall enable server
      args:
        creates: /etc/awall/server.json
      notify: 
        - activate awall
        - lbu commit

    # --- 3. PODMAN & CONTAINER (AUSGELAGERT!) ---
    - name: Configure Podman and Containers
      ansible.builtin.include_tasks: tasks/podman.yml
